name: plant_disease_detection_mobile
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

# ------------PACKAGES-------------
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Core Packages
  flutter_localizations: # Built-in Flutter package
    sdk: flutter
  get: ^4.6.6
  dio: ^5.4.3+1
  image_picker: ^1.1.2  # Capture images from camera/gallery
  image: ^4.5.4   # Image resizing/compression
  hive: ^2.2.3    # Caching processed images
  hive_flutter: ^1.1.0    # Caching processed images
  flutter_isolate: ^2.1.0   # Multi-threading for heavy tasks
  shared_preferences: ^2.2.2
  jwt_decoder: ^2.0.1
  json_serializable: ^6.7.1

  # --- Location & Maps
  geolocator: ^14.0.0   # GPS coordinates for drone scans
  google_maps_flutter: ^2.5.0

  # --- Utilities
  camera: ^0.11.1   # Real-time video capture (if needed)
  path_provider: ^2.1.5   # Local file system access
  get_storage: ^2.1.1   # Lightweight key-value storage
  intl: ^0.19.0   # Date/time formatting
  uuid: ^4.5.1    # Generate unique IDs for images
  flutter_dotenv: ^5.2.1    # Environment variables
  connectivity_plus: ^6.1.3   # Check internet status
  permission_handler: ^12.0.0+1   # Request camera/GPS permissions
  fluttertoast: ^8.2.12   # Toast notifications
  shimmer: ^3.0.0   # Loading placeholders
  flutter_native_splash: ^2.4.6 # splash screen
  logger: ^2.5.0
  url_launcher: ^6.2.5
  iconsax: ^0.0.8
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^1.2.1

  # --- Drone
  web_socket_channel: ^3.0.3    # Real-time drone communication
  carousel_slider: ^5.0.0
  percent_indicator: ^4.2.5
  image_cropper: ^9.1.0
  flutter_markdown: ^0.7.7+1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.8


# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # ------------LOCAL ASSETS-------------
  assets:
    - assets/images/on_boarding_images/
    - assets/images/animations/
    - assets/images/user/
    - assets/images/trending_news/
    - assets/images/leaves_images/
    - assets/images/disease_detection/
    - assets/icons/categories/
    - assets/icons/payment_methods/
    - assets/logos/

  # ------------LOCAL FONTS-------------
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
